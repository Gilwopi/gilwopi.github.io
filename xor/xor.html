    <body>
      <h1>XOR Encryption</h1>
      <p>Use a key to encrypt and decrypt messages. The same key used for encryption must be used to decrypt for the message to be interpreted correctly.</p>
      <label for="key">Key:</label>
      <input type="text" id="key" name="key" size=20>
      <br><br>
      <label for="message">Message:</label>
      <br>
      <textarea type="text" id="message" name="message"></textarea>
      <br><br>
      <button id="btn">Generate Encrypted/Decrypted Message</button>
      <p id="output"></p>
      <script src="../xor/xor.js"></script>
    </body>
</html>
