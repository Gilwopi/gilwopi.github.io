<!DOCTYPE html>
<html>
    <head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
      <title>Caesar Encryption</title>
      <a href="../index.html">Return to Project Page</a>
    </head>
    <body>
      <h1>Caesar Encryption</h1>
      <p>Use a number key to encrypt and decrypt messages.</p>
      <input type="radio" name="choice" value="encrypt">
      <label for="encrypt">Encrypt</label>
      <input type="radio" name="choice" value="decrypt">
      <label for="decrypt">Decrypt</label>
      <br><br>
      <label for="key">Key:</label>
      <input type="number" id="key" name="key" size=20>
      <br><br>
      <label for="message">Message:</label>
      <br>
      <textarea type="text" id="message" name="message" style="white-space:pre;" rows="5" cols="50"></textarea>
      <br><br>
      <button id="btn">Generate Encrypted/Decrypted Message</button>
      <p id="output" style="white-space: pre;"></p>
      <script src="../caesar/caesar.js"></script>
    </body>
</html>
